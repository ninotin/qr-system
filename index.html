<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>QR受付アプリ</title>

<!-- QRスキャンライブラリ -->
<script src="https://unpkg.com/html5-qrcode@2.3.8"></script>

<style>
body {
  font-family: sans-serif;
  text-align: center;
}

#reader {
  width: 300px;
  margin: 20px auto;
}

button {
  font-size: 18px;
  padding: 12px;
  margin: 10px;
}
</style>
</head>

<body>

<h2>QR受付アプリ</h2>

<button id="start">📷 スキャン開始</button>

<div id="reader"></div>

<script>

let scanner;
let scanned = false;

document.getElementById("start").addEventListener("click", () => {

  scanned = false;

  scanner = new Html5QrcodeScanner("reader", {
    fps: 10,
    qrbox: 250
  });

  scanner.render(onScanSuccess);

});

function onScanSuccess(decodedText) {

  // 連続スキャン防止
  if (scanned) return;
  scanned = true;

  // QRの中身（URL）
  const url = decodedText;

  // 安全チェック（GASのみ許可）
  if (!url.startsWith("https://script.google.com")) {
    alert("QRコードが不正です");
    scanned = false;
    return;
  }

  // 読み取り停止（任意）
  scanner.clear();

  fetch(url)
    .then(res => res.text())
    .then(result => {

      if (result === "OK") {
        alert("OK 入場");
      } else if (result === "USED") {
        alert("使用済みです");
      } else {
        alert("無効なQRです");
      }

    })
    .catch(() => {
      alert("通信エラー");
    });

}

</script>

</body>
</html>
