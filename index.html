<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://unpkg.com/html5-qrcode@2.3.8"></script>

<style>
body {
  font-family: sans-serif;
  text-align: center;
}

#reader {
  width: 300px;
  margin: 20px auto;
}

#result {
  margin-top: 20px;
  font-size: 24px;
  font-weight: bold;
}

.ok { color: green; }
.ng { color: red; }
</style>
</head>

<body>

<h2>QR受付</h2>

<button id="start">📷 スキャン開始</button>

<div id="reader"></div>
<div id="result"></div>

<script>
let scanned = false;
let scanner;

// 音（任意）
const beepOk = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");
const beepNg = new Audio("https://actions.google.com/sounds/v1/cartoon/boing.ogg");

document.getElementById("start").addEventListener("click", () => {

  if (scanner) return;

  scanner = new Html5QrcodeScanner("reader", {
    fps: 10,
    qrbox: 250
  });

  scanner.render(onScanSuccess);
});

function onScanSuccess(decodedText) {

  if (scanned) return;
  scanned = true;

  fetch(decodedText)
    .then(res => res.text())
    .then(html => {

      const resultDiv = document.getElementById("result");

      // 結果を表示
      resultDiv.innerHTML = html;

      // 判定（簡易）
      if (html.includes("OK")) {
        resultDiv.className = "ok";
        beepOk.play();
      } else {
        resultDiv.className = "ng";
        beepNg.play();
      }

      // 3秒後に次の受付可能
      setTimeout(() => {
        scanned = false;
        resultDiv.innerHTML = "";
      }, 3000);

    })
    .catch(() => {
      alert("通信エラー");
      scanned = false;
    });
}
</script>

</body>
</html>
