<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>QR受付アプリ</title>

<!-- PWA設定 -->
<link rel="manifest" href="manifest.json">

<!-- QRスキャン -->
<script src="https://unpkg.com/html5-qrcode@2.3.8"></script>

<style>
body {
  font-family: sans-serif;
  text-align: center;
}

#reader {
  width: 300px;
  margin: auto;
}

button {
  font-size: 18px;
  padding: 12px;
  margin: 10px;
}
</style>
</head>

<body>

<h2>QR受付アプリ</h2>

<button id="start">📷 スキャン開始</button>

<div id="reader"></div>

<script>

const GAS_URL = "https://script.google.com/macros/s/【デプロイID】/exec";

document.getElementById("start").addEventListener("click", () => {

  const scanner = new Html5QrcodeScanner("reader", {
    fps: 10,
    qrbox: 250
  });

  scanner.render((decodedText) => {

    const id = decodedText.match(/id=(\d+)/)?.[1];

    if (!id) {
      alert("QRエラー");
      return;
    }

    fetch(GAS_URL + "?id=" + id)
      .then(res => res.text())
      .then(result => {

        if (result === "OK") {
          alert("OK 入場");
        } else if (result === "USED") {
          alert("使用済");
        } else {
          alert("無効");
        }

      });

  });

});

</script>

</body>
</html>
